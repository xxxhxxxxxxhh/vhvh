<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

/* ================= BASE ================= */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Poppins', sans-serif;
  background: #020617;
  color: white;
}

/* ================= CONTAINER ================= */
.container {
  width: 90%;
  max-width: 1200px;
  margin: auto;
}

/* ================= NAV ================= */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 0;
}

.logo {
  font-size: 22px;
  font-weight: 700;
  color: #38bdf8;
}

nav a {
  margin-left: 20px;
  text-decoration: none;
  color: #cbd5f5;
  font-size: 14px;
}

nav a:hover {
  color: #38bdf8;
}

/* ================= HERO ================= */
.hero {
  text-align: center;
  padding: 100px 0;
}

.hero h1 {
  font-size: 42px;
  background: linear-gradient(90deg,#38bdf8,#6366f1);
  -webkit-background-clip: text;
  color: transparent;
}

.hero p {
  color: #94a3b8;
  margin-top: 10px;
}

/* ================= SECTION ================= */
section {
  padding: 80px 0;
  text-align: center;
}

h2 {
  margin-bottom: 30px;
}

/* ================= GRID ================= */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(260px,1fr));
  gap: 25px;
}

/* ================= SERVICE CARD ================= */
.card {
  position: relative;
  height: 250px;
  border-radius: 15px;
  overflow: hidden;
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: brightness(0.6);
}

.card h3,
.card p {
  position: absolute;
  left: 20px;
}

.card h3 {
  bottom: 50px;
  color: #38bdf8;
}

.card p {
  bottom: 20px;
  color: #ddd;
}

/* ================= PROCESS ================= */
.process {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
}

.step {
  margin: 20px;
}

.circle {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: linear-gradient(#38bdf8,#6366f1);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: auto;
  font-weight: bold;
}

/* ================= WHY ================= */
.why-card {
  background: rgba(255,255,255,0.05);
  padding: 25px;
  border-radius: 12px;
}

/* ================= CTA ================= */
.cta {
  margin-top: 20px;
}

.btn {
  padding: 12px 25px;
  border-radius: 30px;
  border: none;
  background: linear-gradient(90deg,#38bdf8,#6366f1);
  color: white;
  cursor: pointer;
}

/* ================= FOOTER ================= */
footer {
  text-align: center;
  padding: 20px;
  color: #94a3b8;
}

/* ================= WHATSAPP ================= */
.whatsapp {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25D366;
  padding: 15px;
  border-radius: 50%;
  color: white;
  text-decoration: none;
}

/* ================= RESPONSIVE ================= */
@media(max-width:768px){

  header {
    flex-direction: column;
  }

  nav {
    margin-top: 10px;
  }

  .hero h1 {
    font-size: 28px;
  }

  .grid {
    grid-template-columns: 1fr;
  }

}

</style>
</head>

<body>

<div class="container">

<header>

    <div class="card">

<section>

<section>

<footer>
  © 2026 Veyon Exim

</div>

</html>
