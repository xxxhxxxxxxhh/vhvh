<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veyon Exim</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
  background:#020617;
  color:white;
  overflow-x:hidden;
}

/* LOADER */
#loader{
  position:fixed;
  width:100%;
  height:100%;
  background:#020617;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.loader-text{
  font-size:32px;
  color:#38bdf8;
  animation:glow 1.5s infinite alternate;
}

@keyframes glow{
  from{opacity:0.5;}
  to{opacity:1;}
}

/* PARTICLES */
#particles{
  position:fixed;
  width:100%;
  height:100%;
  z-index:-1;
}

/* NAV */
header{
  display:flex;
  justify-content:space-between;
  padding:20px 50px;
  backdrop-filter:blur(10px);
}

header h1{
  color:#38bdf8;
}

nav a{
  color:#cbd5f5;
  margin-left:20px;
  text-decoration:none;
  transition:0.3s;
}

nav a:hover{
  color:#38bdf8;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h2{
  font-size:48px;
  background:linear-gradient(90deg,#38bdf8,#6366f1);
  -webkit-background-clip:text;
  color:transparent;
}

.hero p{
  color:#94a3b8;
  margin:20px 0;
}

/* BUTTONS */
.btn{
  padding:12px 25px;
  margin:10px;
  border-radius:30px;
  border:none;
  cursor:pointer;
  transition:0.3s;
}

.btn-primary{
  background:linear-gradient(90deg,#38bdf8,#6366f1);
  color:white;
  box-shadow:0 0 20px #38bdf8;
}

.btn-primary:hover{
  transform:scale(1.05);
}

/* SECTIONS */
section{
  padding:80px 50px;
  text-align:center;
}

h3{
  margin-bottom:20px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:25px;
}

/* GLASS CARD */
.card{
  padding:25px;
  border-radius:15px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.1);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-10px);
  box-shadow:0 0 25px rgba(56,189,248,0.5);
}

/* STATS */
.stats{
  display:flex;
  justify-content:space-around;
  flex-wrap:wrap;
}

.stat{
  margin:20px;
}

.stat h2{
  color:#38bdf8;
}

/* FORM */
form{
  max-width:500px;
  margin:auto;
}

input, textarea{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:8px;
  border:none;
  outline:none;
}

/* WHATSAPP */
.whatsapp{
  position:fixed;
  bottom:25px;
  right:25px;
  background:linear-gradient(135deg,#25D366,#128C7E);
  color:white;
  padding:18px;
  border-radius:50%;
  font-size:22px;
  text-decoration:none;
  box-shadow:0 0 20px rgba(37,211,102,0.7);
  z-index:999;
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0%{box-shadow:0 0 10px rgba(37,211,102,0.5);}
  50%{box-shadow:0 0 25px rgba(37,211,102,1);}
  100%{box-shadow:0 0 10px rgba(37,211,102,0.5);}
}

.whatsapp:hover{
  transform:scale(1.1);
}

/* FOOTER */
footer{
  text-align:center;
  padding:20px;
  color:#64748b;
}
</style>
</head>

<body>

<div id="loader"><div class="loader-text">Veyon Exim</div></div>
<canvas id="particles"></canvas>

<header>
  <h1>Veyon Exim</h1>
  <nav>
    <a href=index.html>Home</a>
    <a href=service.html>Services</a>
    <a href=contact.html>Contact</a>
  </nav>
</header>

<section class="hero">
  <h2>Reimagining Global Trade</h2>
  <p>Import • Export • Domestic Supply</p>
  <button class="btn btn-primary">Get Quote</button>
</section>

<section>
  <h3>Our Services</h3>
  <div class="grid">
    <div class="card">Export Services</div>
    <div class="card">Import Services</div>
    <div class="card">Domestic Supply</div>
  </div>
</section>

<section>
  <h3>Our Impact</h3>
  <div class="stats">
    <div class="stat"><h2>100+</h2><p>Suppliers</p></div>
    <div class="stat"><h2>50+</h2><p>Clients</p></div>
    <div class="stat"><h2>10+</h2><p>Regions</p></div>
  </div>
</section>

<section>
  <h3>Request a Quote</h3>
  <form>
    <input type="text" placeholder="Product Required">
    <input type="text" placeholder="Quantity">
    <input type="text" placeholder="Your Location">
    <textarea placeholder="Additional Details"></textarea>
    <button class="btn btn-primary">Submit Request</button>
  </form>
</section>

<!-- WHATSAPP BUTTON -->
<a class="whatsapp" href="https://wa.me/919444384637?text=Hello%20Veyon%20Exim,%20I%20am%20interested%20in%20your%20services" target="_blank">
💬
</a>

<footer>
© 2026 Veyon Exim. All rights reserved.
</footer>

<script>
// LOADER
window.onload=()=>{
  document.getElementById("loader").style.display="none";
};

// PARTICLES
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

for(let i=0;i<80;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*2,
    dx:Math.random()-0.5,
    dy:Math.random()-0.5
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle="#38bdf8";
    ctx.fill();
    p.x+=p.dx;
    p.y+=p.dy;
  });
  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
